version: '3.8'

services:
  artportal-web:
    build: .
    container_name: artportal_ai_server
    restart: always
    ports:
      - "8502:8502"
    volumes:
      - ./dataset:/app/dataset
      - ./history_db:/app/history_db
      
      # 👇 ยุบรวมการ Mount ไฟล์ Database และ AI ทั้งหมดมาไว้ที่โฟลเดอร์เดียว
      - ./data:/app/data
      
    environment:
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8502/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s